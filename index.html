<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Desk - Sistema de Chamados</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <div class="login-logo">
                    <i class="fas fa-headset"></i>
                    <h1>RH Desk</h1>
                    <p>Sistema de Chamados de RH</p>
                </div>
                <form id="login-form" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> E-mail</label>
                        <input type="email" id="login-email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Senha</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>
                <div class="login-footer">
                    <p>Primeiro acesso? Contate o administrador.</p>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="main-app" class="screen">
            <!-- SIDEBAR -->
            <aside id="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-headset"></i>
                    <span>RH Desk</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-details">
                        <span id="user-name-display">Usuário</span>
                        <span id="user-role-display" class="role-badge">Perfil</span>
                    </div>
                </div>
                <nav id="sidebar-nav">
                    <!-- Menu items are dynamically generated -->
                </nav>
                <div class="sidebar-footer">
                    <button onclick="handleLogout()" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </aside>

            <!-- CONTENT -->
            <main id="content">
                <!-- Dynamic content loaded here -->
            </main>
        </div>
    </div>

    <!-- MODAL TEMPLATE -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button onclick="closeModal()" class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container"></div>

      <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container"></div>

    <script src="app-bundle.js"></script>
</body>
</html>
