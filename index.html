<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Desk - Sistema de Chamados</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- LOADING SCREEN -->
        <div id="loading-screen" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
            <i class="fas fa-spinner fa-spin" style="font-size:40px;color:#4f46e5;"></i>
            <p style="color:#64748b;font-size:16px;">Carregando RH Desk...</p>
        </div>

        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="screen">
            <div class="login-container">
                <div class="login-logo">
                    <i class="fas fa-headset"></i>
                    <h1>RH Desk</h1>
                    <p>Sistema de Chamados de RH</p>
                </div>
                <form id="login-form" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> E-mail</label>
                        <input type="email" id="login-email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Senha</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>
                <div class="login-footer">
                    <p>Primeiro acesso? Contate o administrador.</p>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="main-app" class="screen">
            <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()" style="display:none;">
                <i class="fas fa-bars"></i>
            </button>
            <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
            <aside id="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-headset"></i>
                    <span>RH Desk</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-details">
                        <span id="user-name-display">Usuario</span>
                        <span id="user-role-display" class="role-badge">Perfil</span>
                    </div>
                </div>
                <nav id="sidebar-nav"></nav>
                <div class="sidebar-footer">
                    <button onclick="handleLogout()" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </aside>
            <main id="content"></main>
        </div>
    </div>

    <!-- MODAL TEMPLATE -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button onclick="closeModal()" class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container"></div>

    <!-- SCRIPTS -->
    <script src="app-bundle.js"></script>
    <script src="supabase-db.js"></script>
    <script src="import-users.js"></script>
    <script src="features.js"></script>
    <script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        var ov = document.getElementById('sidebar-overlay');
        if (ov) ov.classList.toggle('active');
    }
    document.addEventListener('click', function(e) {
        if (e.target.closest('#sidebar-nav .nav-item') && window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
            var ov = document.getElementById('sidebar-overlay');
            if (ov) ov.classList.remove('active');
        }
    });

    (async function() {
        console.log('=== RH DESK INIT (Supabase) ===');

        // 1. Tentar carregar do Supabase
        var supaOk = false;
        try {
            supaOk = await loadFromSupabase();
        } catch(e) {
            console.warn('Supabase indisponivel:', e);
        }

        // 2. Se Supabase falhou, tentar localStorage
        if (!supaOk) {
            console.log('Fallback para localStorage...');
            db.loadFromLocal();
        }

        // 3. Se vazio, criar dados padrão localmente
        if (!db.data.users || db.data.users.length === 0) {
            console.log('Criando dados padrao...');
            db.createDefaultData();
            db.saveToLocal();
        }
        if (!db.data.catalog || !db.data.catalog.categories || db.data.catalog.categories.length === 0) {
            db.createDefaultCatalog();
            db.saveToLocal();
        }
        if (!db.data.sla || db.data.sla.length === 0) {
            db.createDefaultSLA();
            db.saveToLocal();
        }

        console.log('PRONTO - Users:', db.data.users.length,
                     '| Tickets:', db.data.tickets.length,
                     '| Categorias:', db.data.catalog.categories ? db.data.catalog.categories.length : 0);

        // 4. Esconder loading e mostrar tela
                // Auto-fechar chamados com prazo de aceite expirado
        try { await autoCloseExpiredTickets(); } catch(e) {}
        document.getElementById('loading-screen').style.display = 'none';
        if (checkSession()) {
            showMainApp();
        } else {
            showLoginScreen();
        }

        // 5. Auto-sync do Supabase a cada 2 minutos
        setInterval(async function() {
            try {
                await loadFromSupabase();
            } catch(e) {}
        }, 2 * 60 * 1000);
    })();
    </script>
</body>
</html>
