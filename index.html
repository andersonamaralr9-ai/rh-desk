<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Desk - Sistema de Chamados</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- LOADING SCREEN -->
        <div id="loading-screen" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
            <i class="fas fa-spinner fa-spin" style="font-size:40px;color:#4f46e5;"></i>
            <p style="color:#64748b;font-size:16px;">Carregando RH Desk...</p>
        </div>

        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="screen">
            <div class="login-container">
                <div class="login-logo">
                    <i class="fas fa-headset"></i>
                    <h1>RH Desk</h1>
                    <p>Sistema de Chamados de RH</p>
                </div>
                <form id="login-form" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> E-mail</label>
                        <input type="email" id="login-email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Senha</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>
                <div class="login-footer">
                    <p>Primeiro acesso? Contate o administrador.</p>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="main-app" class="screen">
            <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()" style="display:none;"><i class="fas fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
            <aside id="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-headset"></i>
                    <span>RH Desk</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-details">
                        <span id="user-name-display">Usuario</span>
                        <span id="user-role-display" class="role-badge">Perfil</span>
                    </div>
                </div>
                <nav id="sidebar-nav"></nav>
                <div class="sidebar-footer">
                    <button onclick="handleLogout()" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </aside>
            <main id="content"></main>
        </div>
    </div>

    <!-- MODAL TEMPLATE -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button onclick="closeModal()" class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container"></div>

    <!-- SCRIPTS NA ORDEM CORRETA -->
    <script src="app-bundle.js"></script>
    <script src="github-auto.js"></script>
    <script src="import-users.js"></script>
        <script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        var ov = document.getElementById('sidebar-overlay');
        if (ov) ov.classList.toggle('active');
    }
    document.addEventListener('click', function(e) {
        if (e.target.closest('#sidebar-nav .nav-item') && window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
            var ov = document.getElementById('sidebar-overlay');
            if (ov) ov.classList.remove('active');
        }
    });

    (async function() {
        console.log('=== INICIO ===');

        // 1. Tentar buscar dados da nuvem (publico, sem token)
        var cloudLoaded = false;
        try {
            console.log('Buscando dados da nuvem...');
            var owner = RHDESK_CLOUD.owner;
            var repo = RHDESK_CLOUD.repo;
            if (owner) {
                var cloudData = await fetchPublicData(owner, repo);
                if (cloudData.users && cloudData.users.length > 0) {
                    db.data.users = cloudData.users;
                    cloudLoaded = true;
                    console.log('NUVEM: ' + cloudData.users.length + ' usuarios carregados');
                }
                if (cloudData.tickets) db.data.tickets = cloudData.tickets;
                if (cloudData.catalog && cloudData.catalog.categories) db.data.catalog = cloudData.catalog;
                if (cloudData.sla && cloudData.sla.length > 0) db.data.sla = cloudData.sla;
                if (cloudData.messages) db.data.messages = cloudData.messages;
                db.saveToLocal();
            }
        } catch(e) {
            console.warn('Cloud sync erro:', e);
        }

        // 2. Se nuvem nao carregou, tentar localStorage
        if (!cloudLoaded) {
            console.log('Nuvem nao disponivel, tentando localStorage...');
            db.loadFromLocal();
        }

        // 3. Se tambem nao tem localStorage, criar dados padrao
        if (!db.data.users || db.data.users.length === 0) {
            console.log('Criando dados padrao...');
            db.createDefaultData();
            db.saveToLocal();
        }
        if (!db.data.catalog || !db.data.catalog.categories || db.data.catalog.categories.length === 0) {
            db.createDefaultCatalog();
            db.saveToLocal();
        }
        if (!db.data.sla || db.data.sla.length === 0) {
            db.createDefaultSLA();
            db.saveToLocal();
        }

        // 4. Configurar GitHub autenticado se tiver token salvo
        try {
            var ghConfig = localStorage.getItem('rhdesk_github_config');
            if (ghConfig) {
                var config = JSON.parse(ghConfig);
                if (config.token && config.owner && config.repo) {
                    githubAPI.configure(config.token, config.owner, config.repo);
                    db.useGitHub = true;
                    console.log('GitHub autenticado configurado');
                }
            }
        } catch(e) {}

        console.log('FINAL - Users:', db.data.users.length, db.data.users.map(function(u){return u.email;}));
        document.getElementById('loading-screen').style.display = 'none';

        if (checkSession()) {
            showMainApp();
        } else {
            showLoginScreen();
        }

        // Auto-sync a cada 3 minutos
        setInterval(async function() {
            try {
                if (db.useGitHub && currentUser) {
                    await db.syncFromGitHub();
                } else if (RHDESK_CLOUD.owner) {
                    var data = await fetchPublicData(RHDESK_CLOUD.owner, RHDESK_CLOUD.repo);
                    if (data.users && data.users.length > 0) {
                        db.data.users = data.users;
                        if (data.tickets) db.data.tickets = data.tickets;
                        if (data.catalog) db.data.catalog = data.catalog;
                        if (data.sla) db.data.sla = data.sla;
                        if (data.messages) db.data.messages = data.messages;
                        db.saveToLocal();
                    }
                }
            } catch(e) {}
        }, 3 * 60 * 1000);
    })();
    </script>
</body>
</html>
